<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos Fijos - Ingeniería del Ahorro</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="appLayout" class="app-layout"></div>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error();

document.getElementById('appLayout').innerHTML = `
  ${renderLayout('gastos-fijos.html')}
  <div class="main-content">
    ${renderTopbar('Gastos Fijos', 'Controla tus gastos recurrentes', true)}
    <div class="page-content">
      <div class="page-header">
        <div><h2>Gastos Fijos</h2><p>Arriendo, servicios, suscripciones y más</p></div>
        <button class="btn btn-danger" onclick="openModal()">+ Agregar Gasto Fijo</button>
      </div>

      <div id="alertasSection"></div>

      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="stat-card" style="--card-color:#E74C3C;--card-bg:#FADBD8">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
          <div class="stat-label">Total del Mes</div>
          <div class="stat-value text-danger" id="totalMes">$0</div>
        </div>
        <div class="stat-card" style="--card-color:#F39C12;--card-bg:#FDEBD0">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-label">Pendientes</div>
          <div class="stat-value text-warning" id="totalPendientes">0</div>
        </div>
        <div class="stat-card" style="--card-color:#27AE60;--card-bg:#D5F5E3">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="stat-label">Pagados</div>
          <div class="stat-value text-success" id="totalPagados">0</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Listado de Gastos Fijos</span>
          <div style="display:flex;gap:10px">
            <div class="search-box">
              <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
              <input type="text" class="form-control" id="searchInput" placeholder="Buscar..." style="width:180px" oninput="filterTable()">
            </div>
            <select class="form-control" id="filterEstado" onchange="filterTable()" style="width:130px">
              <option value="">Todos</option>
              <option>Pendiente</option><option>Pagado</option><option>Vencido</option>
            </select>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th><th>Categoría</th><th>Valor</th>
                  <th>Fecha Pago</th><th>Estado</th><th>Prioridad</th><th>Acciones</th>
                </tr>
              </thead>
              <tbody id="gastosBody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
`;

Sidebar.init();
MonthSelector.init();
MonthSelector.onChange(loadGastos);

let allGastos = [];
let editId = null;

async function loadGastos(mes, anio) {
  const res = await Api.get(`/gastos-fijos?mes=${mes}&anio=${anio}`);
  if (!res?.success) return;
  allGastos = res.data || [];
  renderTable(allGastos);
  updateStats(allGastos);
  checkAlertas(allGastos);
}

function updateStats(data) {
  const total = data.reduce((s, g) => s + parseFloat(g.valor || 0), 0);
  document.getElementById('totalMes').textContent = Fmt.currency(total);
  document.getElementById('totalPendientes').textContent = data.filter(g => g.estado === 'Pendiente').length;
  document.getElementById('totalPagados').textContent = data.filter(g => g.estado === 'Pagado').length;
}

function checkAlertas(data) {
  const hoy = new Date();
  const manana = new Date(hoy); manana.setDate(hoy.getDate() + 1);
  const proximos = data.filter(g => {
    if (!g.fechaPago || g.estado === 'Pagado') return false;
    const fp = new Date(g.fechaPago + 'T00:00:00');
    return fp <= manana;
  });
  const alertasEl = document.getElementById('alertasSection');
  if (proximos.length > 0) {
    alertasEl.innerHTML = proximos.map(g => `
      <div style="background:#FDEBD0;border:1px solid #F39C12;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <div>
          <strong>${g.nombre}</strong> vence el ${Fmt.date(g.fechaPago)} —
          <strong>${Fmt.currency(g.valor)}</strong>
        </div>
        <button class="btn btn-warning btn-sm" style="margin-left:auto" onclick="marcarPagado(${g.id})">Marcar pagado</button>
      </div>
    `).join('');
  } else {
    alertasEl.innerHTML = '';
  }
}

function renderTable(data) {
  const tbody = document.getElementById('gastosBody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3>Sin gastos fijos</h3><p>Agrega tus gastos recurrentes</p></div></td></tr>`;
    return;
  }
  const estadoBadge = { Pendiente: 'warning', Pagado: 'success', Vencido: 'danger' };
  const priorBadge = { Alta: 'danger', Media: 'warning', Baja: 'info' };
  tbody.innerHTML = data.map(g => `
    <tr>
      <td><strong>${g.nombre}</strong></td>
      <td>${g.categoria || '-'}</td>
      <td><strong class="text-danger">${Fmt.currency(g.valor)}</strong></td>
      <td>${Fmt.date(g.fechaPago)}</td>
      <td><span class="badge-status badge-${estadoBadge[g.estado] || 'info'}">${g.estado}</span></td>
      <td><span class="badge-status badge-${priorBadge[g.prioridad] || 'info'}">${g.prioridad}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="editGasto(${g.id})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGasto(${g.id})">Eliminar</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const est = document.getElementById('filterEstado').value;
  renderTable(allGastos.filter(g =>
    (!q || g.nombre.toLowerCase().includes(q)) && (!est || g.estado === est)
  ));
}

function openModal(data = null) {
  editId = data?.id || null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.id = 'gastoModal';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">${editId ? 'Editar Gasto Fijo' : 'Nuevo Gasto Fijo'}</h3>
        <button class="modal-close" onclick="document.getElementById('gastoModal').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" class="form-control" id="fNombre" value="${data?.nombre || ''}" placeholder="Ej: Arriendo">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Categoría</label>
            <select class="form-control" id="fCategoria">
              ${['Vivienda','Servicios','Transporte','Educación','Salud','Entretenimiento','Otro'].map(c =>
                `<option ${data?.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Valor (COP) *</label>
            <input type="number" class="form-control" id="fValor" value="${data?.valor || ''}" min="0">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Fecha de pago</label>
            <input type="date" class="form-control" id="fFecha" value="${data?.fechaPago || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Prioridad</label>
            <select class="form-control" id="fPrioridad">
              ${['Alta','Media','Baja'].map(p => `<option ${data?.prioridad === p ? 'selected' : ''}>${p}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-control" id="fEstado">
            ${['Pendiente','Pagado','Vencido'].map(e => `<option ${data?.estado === e ? 'selected' : ''}>${e}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" id="fDesc" rows="2">${data?.descripcion || ''}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('gastoModal').remove()">Cancelar</button>
        <button class="btn btn-danger" onclick="saveGasto()">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function saveGasto() {
  const body = {
    nombre: document.getElementById('fNombre').value.trim(),
    categoria: document.getElementById('fCategoria').value,
    valor: parseFloat(document.getElementById('fValor').value),
    fechaPago: document.getElementById('fFecha').value || null,
    prioridad: document.getElementById('fPrioridad').value,
    estado: document.getElementById('fEstado').value,
    descripcion: document.getElementById('fDesc').value.trim()
  };
  if (!body.nombre || !body.valor) { Toast.show('Completa los campos obligatorios', 'warning'); return; }
  const res = editId ? await Api.put(`/gastos-fijos/${editId}`, body) : await Api.post('/gastos-fijos', body);
  if (res?.success) {
    Toast.show('Guardado correctamente', 'success');
    document.getElementById('gastoModal').remove();
    loadGastos(MonthSelector.mes, MonthSelector.anio);
  } else Toast.show(res?.message || 'Error', 'error');
}

function editGasto(id) { openModal(allGastos.find(g => g.id === id)); }

async function marcarPagado(id) {
  const g = allGastos.find(x => x.id === id);
  if (!g) return;
  g.estado = 'Pagado';
  const res = await Api.put(`/gastos-fijos/${id}`, g);
  if (res?.success) { Toast.show('Marcado como pagado', 'success'); loadGastos(MonthSelector.mes, MonthSelector.anio); }
}

function deleteGasto(id) {
  Confirm.show('¿Eliminar este gasto fijo?', async () => {
    const res = await Api.delete(`/gastos-fijos/${id}`);
    if (res?.success) { Toast.show('Eliminado', 'success'); loadGastos(MonthSelector.mes, MonthSelector.anio); }
  });
}

loadGastos(MonthSelector.mes, MonthSelector.anio);
</script>
</body>
</html>
