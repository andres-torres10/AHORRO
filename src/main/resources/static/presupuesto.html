<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto - Ingeniería del Ahorro</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="appLayout" class="app-layout"></div>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error();

document.getElementById('appLayout').innerHTML = `
  ${renderLayout('presupuesto.html')}
  <div class="main-content">
    ${renderTopbar('Presupuesto', 'Controla cuánto puedes gastar por categoría', true)}
    <div class="page-content">
      <div class="page-header">
        <div><h2>Presupuesto Mensual</h2><p>Define límites de gasto por categoría</p></div>
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo Presupuesto</button>
      </div>
      <div id="presupuestosGrid" class="grid-3"></div>
    </div>
  </div>
`;

Sidebar.init();
MonthSelector.init();
MonthSelector.onChange(loadPresupuestos);

let allPresupuestos = [];
let editId = null;

async function loadPresupuestos(mes, anio) {
  const res = await Api.get(`/presupuestos?mes=${mes}&anio=${anio}`);
  if (!res?.success) return;
  allPresupuestos = res.data || [];
  renderPresupuestos(allPresupuestos);
}

function renderPresupuestos(data) {
  const grid = document.getElementById('presupuestosGrid');
  if (!data.length) {
    grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state card card-body"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><h3>Sin presupuestos</h3><p>Crea presupuestos para controlar tus gastos por categoría</p></div></div>`;
    return;
  }
  grid.innerHTML = data.map(p => {
    const pct = p.valorMaximo > 0 ? Math.min(100, (parseFloat(p.valorGastado || 0) / parseFloat(p.valorMaximo)) * 100) : 0;
    const barClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warning' : 'success';
    const disponible = parseFloat(p.valorMaximo) - parseFloat(p.valorGastado || 0);
    return `
      <div class="card" style="border-top:3px solid ${p.color || '#1B4F72'}">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h3 style="font-size:1rem;font-weight:700">${p.categoria}</h3>
            <div style="display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" onclick="editPresupuesto(${p.id})">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deletePresupuesto(${p.id})">Eliminar</button>
            </div>
          </div>

          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div>
              <div style="font-size:0.7rem;color:var(--text-muted)">Gastado</div>
              <div style="font-weight:700;font-size:1.1rem">${Fmt.currency(p.valorGastado || 0)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:0.7rem;color:var(--text-muted)">Límite</div>
              <div style="font-weight:700;font-size:1.1rem">${Fmt.currency(p.valorMaximo)}</div>
            </div>
          </div>

          <div class="progress-bar-container" style="margin-bottom:8px">
            <div class="progress-bar ${barClass}" style="width:${pct}%;background:${p.color || '#1B4F72'}"></div>
          </div>

          <div style="display:flex;justify-content:space-between;font-size:0.78rem">
            <span style="color:${pct >= 90 ? 'var(--danger)' : 'var(--text-muted)'}">${pct.toFixed(1)}% usado</span>
            <span style="color:${disponible >= 0 ? 'var(--success)' : 'var(--danger)'}">
              ${disponible >= 0 ? 'Disponible: ' : 'Excedido: '}${Fmt.currency(Math.abs(disponible))}
            </span>
          </div>

          ${pct >= 90 && pct < 100 ? `<div style="margin-top:10px;padding:8px;background:#FADBD8;border-radius:6px;font-size:0.78rem;color:var(--danger)">Estás cerca del límite de presupuesto.</div>` : ''}
          ${pct >= 100 ? `<div style="margin-top:6px;padding:8px;background:#FADBD8;border-radius:6px;font-size:0.78rem;color:var(--danger)">Excediste el presupuesto.</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openModal(data = null) {
  editId = data?.id || null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.id = 'presModal';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">${editId ? 'Editar Presupuesto' : 'Nuevo Presupuesto'}</h3>
        <button class="modal-close" onclick="document.getElementById('presModal').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Categoría *</label>
          <select class="form-control" id="fCategoria">
            ${['Comida','Transporte','Entretenimiento','Ropa','Salud','Educación','Tecnología','Hogar','Otro'].map(c =>
              `<option ${data?.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Límite Máximo (COP) *</label>
            <input type="number" class="form-control" id="fValorMax" value="${data?.valorMaximo || ''}" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Ya gastado (COP)</label>
            <input type="number" class="form-control" id="fValorGastado" value="${data?.valorGastado || 0}" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Mes</label>
            <select class="form-control" id="fMes">
              ${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${(data?.mes || MonthSelector.mes) === i+1 ? 'selected' : ''}>${Fmt.monthName(i+1)}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Año</label>
            <input type="number" class="form-control" id="fAnio" value="${data?.anio || MonthSelector.anio}" min="2020">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <input type="color" class="form-control" id="fColor" value="${data?.color || '#1B4F72'}" style="height:40px;cursor:pointer">
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" id="fDesc" rows="2">${data?.descripcion || ''}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('presModal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="savePresupuesto()">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function savePresupuesto() {
  const body = {
    categoria: document.getElementById('fCategoria').value,
    valorMaximo: parseFloat(document.getElementById('fValorMax').value),
    valorGastado: parseFloat(document.getElementById('fValorGastado').value) || 0,
    mes: parseInt(document.getElementById('fMes').value),
    anio: parseInt(document.getElementById('fAnio').value),
    color: document.getElementById('fColor').value,
    descripcion: document.getElementById('fDesc').value.trim()
  };
  if (!body.valorMaximo) { Toast.show('Ingresa el límite máximo', 'warning'); return; }
  const res = editId ? await Api.put(`/presupuestos/${editId}`, body) : await Api.post('/presupuestos', body);
  if (res?.success) {
    Toast.show('Guardado', 'success');
    document.getElementById('presModal').remove();
    loadPresupuestos(MonthSelector.mes, MonthSelector.anio);
  } else Toast.show(res?.message || 'Error', 'error');
}

function editPresupuesto(id) { openModal(allPresupuestos.find(p => p.id === id)); }

function deletePresupuesto(id) {
  Confirm.show('¿Eliminar este presupuesto?', async () => {
    const res = await Api.delete(`/presupuestos/${id}`);
    if (res?.success) { Toast.show('Eliminado', 'success'); loadPresupuestos(MonthSelector.mes, MonthSelector.anio); }
  });
}

loadPresupuestos(MonthSelector.mes, MonthSelector.anio);
</script>
</body>
</html>
