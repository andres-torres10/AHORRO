# ===================================
# INGENIERÍA DEL AHORRO - CONFIG
# ===================================

# Server
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ingenieria_ahorro?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=IngenieriaDelAhorroSecretKey2024SuperSeguraYLarga123456789
jwt.expiration=86400000

# Google OAuth2 — Reemplaza con tu Client ID de Google Cloud Console
# Obtén uno en: https://console.cloud.google.com → APIs → Credenciales → OAuth 2.0
google.client-id=TU_GOOGLE_CLIENT_ID.apps.googleusercontent.com

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
spring.web.cors.allowed-origins=*

# Logging
logging.level.com.ingenieriadelahorro=INFO
